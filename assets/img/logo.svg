<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="山梨HPかけこみ寺">
  <!-- ============================================================
       仮ロゴ（プレースホルダー）。正式ロゴ支給時はこのファイルを
       そのまま差し替えれば全ページのヘッダー・favicon系に反映されます。
       モチーフ：障子越しにともる桃色の灯り＋「寺」。
       配色は :root と統一（藍 #27406B / 桃 #F2A3AB / 生成り #FCFAF6）。
       ============================================================ -->
  <defs>
    <radialGradient id="lamp" cx="50%" cy="40%" r="62%">
      <stop offset="0%"  stop-color="#FCE3E6"/>
      <stop offset="55%" stop-color="#F2A3AB"/>
      <stop offset="100%" stop-color="#E07F89"/>
    </radialGradient>
  </defs>
  <!-- 藍の角丸地 -->
  <rect width="64" height="64" rx="14" fill="#27406B"/>
  <!-- 灯り（桃のともしび） -->
  <circle cx="32" cy="29" r="17" fill="url(#lamp)"/>
  <!-- 障子の桟（縦横） -->
  <g stroke="#27406B" stroke-width="2" opacity=".9">
    <line x1="32" y1="12" x2="32" y2="46"/>
    <line x1="15" y1="29" x2="49" y2="29"/>
  </g>
  <!-- 「寺」の字（生成り） -->
  <text x="32" y="38" text-anchor="middle"
        font-family="'Shippori Mincho','Yu Mincho',serif"
        font-size="22" font-weight="700" fill="#FCFAF6">寺</text>
</svg>
